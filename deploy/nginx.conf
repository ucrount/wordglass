# WordGlass nginx server block.
# Place at /etc/nginx/sites-available/wordglass and symlink into sites-enabled.
# Replace SERVER_NAME with your domain or VPS IP.

server {
    listen 80;
    listen [::]:80;
    server_name SERVER_NAME;

    # If you set up TLS later (recommended), uncomment:
    # return 301 https://$host$request_uri;

    root /opt/wordglass/frontend/dist;
    index index.html;

    # Gzip text assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # API → uvicorn
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }

    # Static SPA — fall back to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for hashed Vite assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
